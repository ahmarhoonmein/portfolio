<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088BB"/>
      <stop offset="100%" stop-color="#A07000"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="32" height="32" rx="7" fill="#0A0E1A"/>
  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <!-- Letter A — bold, centered, gradient -->
  <text
    x="16"
    y="24"
    text-anchor="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="22"
    fill="url(#grad)"
    letter-spacing="-1"
  >A</text>
</svg>
